name: Weekly Pipeline

on:
  schedule:
    # Domingos a las 06:00 UTC (antes de que abran los mercados europeos el lunes)
    - cron: "0 6 * * 0"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write GCP credentials
        run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > src/config/service-account.json

      # ── 1. Refrescar datos fundamentales de empresas ────────────────────
      - name: weekly_companies
        run: python -m src.jobs.weekly_companies

      # ── 2. Re-enriquecer con los nuevos fundamentales ───────────────────
      - name: daily_enrich
        run: python -m src.jobs.daily_enrich

      - name: Cleanup credentials
        if: always()
        run: rm -f src/config/service-account.json

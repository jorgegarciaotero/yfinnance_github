name: Daily Pipeline

on:
  workflow_dispatch:   # lanzamiento manual desde GitHub (la automatización corre en Cloud Scheduler)

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write GCP credentials
        run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > src/config/service-account.json

      # ── 1. Precios diarios ──────────────────────────────────────────────
      - name: daily_prices
        run: python -m src.jobs.daily_prices

      # ── 2. Enriquecer con indicadores técnicos ──────────────────────────
      - name: daily_enrich
        run: python -m src.jobs.daily_enrich

      # ── 3. Daily picks (top 20 opportunities) ──────────────────────────
      - name: daily_picks
        run: python -m src.jobs.daily_picks

      - name: Cleanup credentials
        if: always()
        run: rm -f src/config/service-account.json

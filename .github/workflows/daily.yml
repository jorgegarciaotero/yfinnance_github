name: Daily Pipeline

on:
  schedule:
    # Lunes a viernes a las 06:00 UTC → 7h CET (invierno) / 8h CEST (verano)
    # Recoge los datos del día anterior (mercados ya cerrados) y los tiene listos por la mañana
    - cron: "0 6 * * 1-5"
  workflow_dispatch:   # permite lanzarlo manualmente desde GitHub

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write GCP credentials
        run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > src/config/service-account.json

      # ── 1. Precios diarios ──────────────────────────────────────────────
      - name: daily_prices
        run: python -m src.jobs.daily_prices

      # ── 2. Enriquecer con indicadores técnicos ──────────────────────────
      - name: daily_enrich
        run: python -m src.jobs.daily_enrich

      # ── 3. War dip scanner ──────────────────────────────────────────────
      - name: daily_scanner
        run: python -m src.jobs.daily_scanner

      - name: Cleanup credentials
        if: always()
        run: rm -f src/config/service-account.json
